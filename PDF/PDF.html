<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Report</title>
</head >
<body >
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #pdf-fallback {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            margin: 0;
            z-index: 2;
            text-align: center;
            padding: 50px 10px 50px 10px;
            background: rgb(255, 255, 255);
            font-family: Arial, sans-serif;
            
        }
        p{animation: alert 5s ease infinite;
            font-size: large;
            font-weight: bold;}
        @keyframes alert{
            50%{color:rgb(179, 0, 0);opacity:0.9;}
            60%{opacity:1;}
        
            100%{color:black;}
        }
        
        #pdf-viewer {filter:blur(1px);
            position: absolute;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
            
            pointer-events: auto;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 1;
            overflow: auto;
        }
        @media (max-width: 650px) {
            #pdf-viewer {
                display: none;
                user-select: none;
                -webkit-user-select: none;
                -ms-user-select: none;
            }
        }
        
    </style>
    <div id="pdf-fallback"><p>If you are unable to view the PDF, please use another browser</p></div>
    <embed id="pdf-viewer" src="Project Report pdf.pdf" type="application/pdf" style="width: 100vw; height: 100vh;margin:0;padding:0;border:none; filter:blur(1.2px)">
</body>
</html>
